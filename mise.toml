[tools]
go = "1.25"
golangci-lint = "2.11"
goreleaser = "2.5"

[tasks]
version-ldflags = "-s -w"
version-version = "-X github.com/beeemt/oxygen/internal/version.version=dev"
version-commit = "-X github.com/beeemt/oxygen/internal/version.commit=$(git rev-parse --short HEAD)"
version-date = "-X github.com/beeemt/oxygen/internal/version.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
build = "cd cmd/o2 && go build -ldflags=\"${version-ldflags} ${version-version} ${version-commit} ${version-date}\" -o ../../o2 ."
install = "cd cmd/o2 && go install -ldflags=\"${version-ldflags} ${version-version} ${version-commit} ${version-date}\""
lint = "golangci-lint run ./..."
test = "go test -race ./..."
test-short = "go test ./..."
clean = "rm -f o2 && go clean"
fmt = "go fmt ./..."
vet = "go vet ./..."
tidy = "go mod tidy"
check = [
  "go mod tidy",
  "go fmt ./...",
  "go vet ./...",
  "golangci-lint run ./...",
  "go test -race ./...",
]
darwin-arm64 = "cd cmd/o2 && GOOS=darwin GOARCH=arm64 go build -ldflags=\"-s -w\" -o ../../o2-darwin-arm64 ."
darwin-amd64 = "cd cmd/o2 && GOOS=darwin GOARCH=amd64 go build -ldflags=\"-s -w\" -o ../../o2-darwin-amd64 ."
linux-amd64 = "cd cmd/o2 && GOOS=linux GOARCH=amd64 go build -ldflags=\"-s -w\" -o ../../o2-linux-amd64 ."
release.run = ["darwin-arm64", "darwin-amd64", "linux-amd64"]
